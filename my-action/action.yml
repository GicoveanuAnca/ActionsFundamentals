name: 'Say Hi - Docker Actions!'
description: 'Say hi and save time'
author: 'Anca'
inputs:
  who-to-greet:
    description: 'Who to greet'
    required: true
    default: 'world'
outputs:
  time:
    description: 'The time we said hello.'
runs:
  using: docker
  image: Dockerfile
  args: 
    - ${{ inputs.who-to-greet }}
  
